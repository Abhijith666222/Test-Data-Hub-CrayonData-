services:
  - type: web
    name: test-data-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: NODE_VERSION
        value: 16
      - key: REACT_APP_API_BASE_URL
        sync: false
      - key: REACT_APP_WS_URL
        sync: false
      - key: REACT_APP_APP_ENVIRONMENT
        value: production
      - key: REACT_APP_ENABLE_DEBUG_MODE
        value: false
      - key: REACT_APP_ENABLE_ANALYTICS
        value: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
